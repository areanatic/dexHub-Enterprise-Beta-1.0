# DexHub Personal Profile Schema v1.0
# Single Source of Truth for profile.yaml structure

schema_version: "1.0"
created: "2025-11-16"
status: "active"

# CONTRACT DEFINITION
contract:
  producer:
    component: "myDex Onboarding"
    file: ".dexCore/core/agents/mydex-agent.md"
    output_file: "myDex/.dex/config/profile.yaml"
    responsibility: "Generate valid profile.yaml from onboarding questions"
    validation: "MUST validate output against this schema before saving"

  consumer:
    component: "DexHub Workflow Engine"
    file: ".dexCore/core/tasks/workflow.xml"
    reads_from: "myDex/.dex/config/profile.yaml"
    consumes: "Session variables {profile_*}"
    responsibility: "Load profile and set session variables"
    validation: "MUST validate input against this schema on load"

  integration_test:
    file: "tests/integration/test_profile_integration.sh"
    validates: "End-to-end: Onboarding → Profile → Workflow → Agent"

# SCHEMA DEFINITION
fields:

  # META SECTION
  version:
    type: string
    required: true
    description: "Schema version (e.g., '1.0')"
    example: "1.0"
    producer_source: "Hardcoded by onboarding agent"
    consumer_usage: "Version compatibility check"

  created_at:
    type: string
    format: ISO8601
    required: true
    description: "Timestamp when profile was created"
    example: "2025-11-16T12:00:00Z"
    producer_source: "Generated by onboarding agent"
    consumer_usage: "Profile freshness tracking"

  last_updated:
    type: string
    format: ISO8601
    required: false
    description: "Timestamp of last profile update"
    example: "2025-11-16T14:30:00Z"
    producer_source: "Updated on profile modification"
    consumer_usage: "Change tracking"

  # PERSONALIZATION SECTION
  personalization:
    type: object
    required: true
    description: "User personalization preferences"

    fields:
      name:
        type: string
        required: true
        description: "User's preferred name (first name or nickname)"
        example: "Alex"
        producer_source: "Q1 in onboarding-questions.yaml"
        consumer_usage: "Personalized greetings in agents"
        validation:
          min_length: 1
          max_length: 100

      language:
        type: enum
        required: true
        values: ["de", "en", "es", "fr", "it", "pt"]
        default: "en"
        description: "Preferred communication language"
        example: "de"
        producer_source: "Q2 in onboarding-questions.yaml"
        consumer_usage: "{profile_language} in workflow.xml, agent responses"
        validation:
          allowed_values: ["de", "en", "es", "fr", "it", "pt"]

      role:
        type: enum
        required: true
        values: ["developer", "architect", "product_manager", "designer", "analyst", "student", "other"]
        default: "developer"
        description: "Primary professional role"
        example: "developer"
        producer_source: "Q3 in onboarding-questions.yaml"
        consumer_usage: "{profile_role} for role-specific content"
        validation:
          allowed_values: ["developer", "architect", "product_manager", "designer", "analyst", "student", "other"]

  # TECHNICAL SECTION
  technical:
    type: object
    required: true
    description: "Technical preferences and expertise"

    fields:
      experience_level:
        type: enum
        required: true
        values: ["junior", "intermediate", "senior", "expert"]
        default: "intermediate"
        description: "Overall technical experience level"
        example: "senior"
        producer_source: "Derived from experience_years (Q4) in onboarding"
        consumer_usage: "{profile_experience} for content complexity adaptation"
        mapping:
          "0-2 years": "junior"
          "3-5 years": "intermediate"
          "6-10 years": "senior"
          "10+ years": "expert"

      code_style:
        type: enum
        required: true
        values: ["airbnb", "google", "standard", "custom"]
        default: "standard"
        description: "Preferred code style guide"
        example: "airbnb"
        producer_source: "Q38 in onboarding-questions.yaml (NEW)"
        consumer_usage: "{profile_code_style} for code examples in agents"
        validation:
          allowed_values: ["airbnb", "google", "standard", "custom"]

      verbosity:
        type: enum
        required: true
        values: ["concise", "balanced", "detailed"]
        default: "balanced"
        description: "Preferred response verbosity level"
        example: "concise"
        producer_source: "Q39 in onboarding-questions.yaml (NEW)"
        consumer_usage: "{profile_verbosity} for response length adaptation"
        validation:
          allowed_values: ["concise", "balanced", "detailed"]

  # TECH STACK SECTION
  tech:
    type: object
    required: true
    description: "Technology stack preferences"

    fields:
      primary_stack:
        type: array
        item_type: string
        required: true
        min_items: 1
        max_items: 10
        description: "Primary technologies user works with"
        example: ["typescript", "react", "nodejs"]
        producer_source: "Q10-Q15 in onboarding-questions.yaml"
        consumer_usage: "{profile_tech_stack} for prioritized recommendations"
        validation:
          min_items: 1
          max_items: 10

      secondary_stack:
        type: array
        item_type: string
        required: false
        max_items: 10
        description: "Secondary/learning technologies"
        example: ["python", "docker"]
        producer_source: "Q16 in onboarding-questions.yaml (optional)"
        consumer_usage: "Additional context for recommendations"
        default: []

      interests:
        type: array
        item_type: string
        required: false
        max_items: 10
        description: "Technologies user wants to learn"
        example: ["rust", "kubernetes"]
        producer_source: "Q17 in onboarding-questions.yaml (optional)"
        consumer_usage: "Learning path suggestions"
        default: []

  # AI PREFERENCES SECTION
  ai:
    type: object
    required: true
    description: "AI tool preferences and readiness"

    fields:
      readiness:
        type: enum
        required: true
        values: ["beginner", "intermediate", "advanced", "expert"]
        default: "intermediate"
        description: "AI tool usage experience level"
        example: "advanced"
        producer_source: "Q20 in onboarding-questions.yaml"
        consumer_usage: "{profile_ai_readiness} for AI feature complexity"
        validation:
          allowed_values: ["beginner", "intermediate", "advanced", "expert"]

      copilot_enabled:
        type: boolean
        required: true
        default: false
        description: "GitHub Copilot usage status"
        example: true
        producer_source: "Q21 in onboarding-questions.yaml"
        consumer_usage: "Copilot-specific features and tips"

      preferred_model:
        type: enum
        required: false
        values: ["claude", "gpt4", "gemini", "local", "other"]
        description: "Preferred AI model if specified"
        example: "claude"
        producer_source: "Q22 in onboarding-questions.yaml (optional)"
        consumer_usage: "Model-specific guidance"

  # COMMUNICATION SECTION
  communication:
    type: object
    required: true
    description: "Communication style preferences"

    fields:
      language_preference:
        type: enum
        required: true
        values: ["de", "en", "es", "fr", "it", "pt"]
        description: "Alias for personalization.language (backward compatibility)"
        example: "de"
        producer_source: "Copied from personalization.language"
        consumer_usage: "{profile_language_preference} in agents"
        note: "Same as personalization.language, kept for backward compatibility"

      verbosity:
        type: enum
        required: true
        values: ["concise", "balanced", "detailed"]
        description: "Alias for technical.verbosity (backward compatibility)"
        example: "balanced"
        producer_source: "Copied from technical.verbosity"
        consumer_usage: "{profile_communication_verbosity} in agents"
        note: "Same as technical.verbosity, kept for backward compatibility"

      formality:
        type: enum
        required: false
        values: ["casual", "professional", "academic"]
        default: "professional"
        description: "Communication formality level"
        example: "professional"
        producer_source: "Q30 in onboarding-questions.yaml (optional)"
        consumer_usage: "Tone adaptation in responses"

  # WORK CONTEXT SECTION
  work:
    type: object
    required: false
    description: "Work environment context (optional for EA-1.0)"

    fields:
      company:
        type: string
        required: false
        description: "Company name (optional)"
        example: "Acme Corp"
        producer_source: "Q35 in onboarding-questions.yaml (optional)"
        consumer_usage: "Company-specific context (future use)"
        note: "V1.3 will add company-tier profiles"

      team:
        type: string
        required: false
        description: "Team name (optional)"
        example: "Platform Team"
        producer_source: "Q36 in onboarding-questions.yaml (optional)"
        consumer_usage: "Team-specific context (future use)"
        note: "V1.3 will add team-tier profiles"

      domain:
        type: enum
        required: false
        values: ["web", "mobile", "backend", "devops", "data", "ml", "embedded", "other"]
        description: "Primary work domain"
        example: "web"
        producer_source: "Q37 in onboarding-questions.yaml (optional)"
        consumer_usage: "Domain-specific recommendations"

  # CUSTOM INSTRUCTIONS SECTION (EA-1.0.1)
  custom_instructions:
    type: object
    required: false
    description: "User-defined rules and context for AI agents"
    version_added: "v1.0.1"

    fields:
      always_do:
        type: array
        item_type: string
        required: false
        min_items: 0
        max_items: 20
        description: "Rules agents should always follow"
        example: ["Use TypeScript strict mode", "Write tests for all features"]
        producer_source: "Q40 in onboarding-questions.yaml"
        consumer_usage: "{profile_custom_always_do} - agents follow these rules in all responses"
        validation:
          max_items: 20
          item_max_length: 200
        default: []

      never_do:
        type: array
        item_type: string
        required: false
        min_items: 0
        max_items: 20
        description: "Rules agents should never violate"
        example: ["Use var keyword", "Commit secrets to git"]
        producer_source: "Q41 in onboarding-questions.yaml"
        consumer_usage: "{profile_custom_never_do} - agents avoid these actions"
        validation:
          max_items: 20
          item_max_length: 200
        default: []

      domain_knowledge:
        type: string
        multiline: true
        required: false
        max_length: 2000
        description: "Project/team context and domain-specific knowledge"
        example: |
          E-Commerce Platform
          Payment Processing (Stripe, PayPal)
          Microservices architecture
        producer_source: "Q42 in onboarding-questions.yaml (VOLLSTÄNDIG only)"
        consumer_usage: "{profile_custom_domain} - provides context for tailored assistance"
        validation:
          max_length: 2000
        default: ""

# VALIDATION RULES
validation:
  on_produce:
    - "Validate all required fields are present"
    - "Validate enum values are in allowed list"
    - "Validate array min/max items"
    - "Validate string min/max length"
    - "Fail loudly if validation fails with clear error message"
    - "Log validation errors with field name and expected format"

  on_consume:
    - "Validate schema version compatibility (v1.x)"
    - "Validate all required fields are present"
    - "Validate field types match schema"
    - "Use defaults for missing optional fields"
    - "Fail gracefully with warning if validation fails"
    - "Log warnings for missing optional fields"

# VERSION EVOLUTION
evolution:
  v1.0:
    date: "2025-11-16"
    changes: "Initial schema creation for EA-1.0"
    breaking_changes: []

  v1.0.1:
    date: "2025-11-17"
    changes: "Add custom_instructions section (always_do, never_do, domain_knowledge)"
    breaking_changes: []
    notes:
      - "custom_instructions is optional - backward compatible"
      - "New onboarding questions Q40-Q42"
      - "New workflow variables: {profile_custom_always_do}, {profile_custom_never_do}, {profile_custom_domain}"

  v1.1_planned:
    date: "TBD"
    changes: "Add company/team profile tiers"
    breaking_changes: []
    note: "V1.3 feature - multi-tier profiles"

  v2.0_planned:
    date: "TBD"
    changes: "Guardian governance integration"
    breaking_changes: ["Schema structure may change for guardian tier"]
    note: "V2.0 feature - enterprise governance"

# MIGRATION GUIDE
migration:
  from_no_profile:
    description: "First-time profile creation"
    steps:
      - "Run myDex onboarding (SMART or VOLLSTÄNDIG)"
      - "Profile generated automatically"
      - "All agents load profile on next run"

  from_v1.0_to_v1.1:
    description: "Future migration when v1.1 is released"
    steps: "TBD when v1.1 is defined"

# EXAMPLES
examples:
  minimal_valid_profile:
    description: "Minimum required fields for valid profile"
    yaml: |
      version: "1.0"
      created_at: "2025-11-16T12:00:00Z"
      personalization:
        name: "Alex"
        language: "en"
        role: "developer"
      technical:
        experience_level: "intermediate"
        code_style: "standard"
        verbosity: "balanced"
      tech:
        primary_stack: ["javascript"]
      ai:
        readiness: "intermediate"
        copilot_enabled: false
      communication:
        language_preference: "en"
        verbosity: "balanced"
      # custom_instructions is optional - omitted in minimal profile

  complete_profile:
    description: "Fully populated profile with all optional fields"
    yaml: |
      version: "1.0"
      created_at: "2025-11-16T12:00:00Z"
      last_updated: "2025-11-16T14:00:00Z"
      personalization:
        name: "Alex"
        language: "de"
        role: "developer"
      technical:
        experience_level: "senior"
        code_style: "airbnb"
        verbosity: "concise"
      tech:
        primary_stack: ["typescript", "react", "nodejs"]
        secondary_stack: ["python", "docker"]
        interests: ["rust", "kubernetes"]
      ai:
        readiness: "advanced"
        copilot_enabled: true
        preferred_model: "claude"
      communication:
        language_preference: "de"
        verbosity: "concise"
        formality: "professional"
      work:
        company: "Acme Corp"
        team: "Platform Team"
        domain: "web"
      custom_instructions:
        always_do:
          - "Use TypeScript strict mode"
          - "Write tests for all features"
          - "Follow Airbnb style guide"
        never_do:
          - "Use var keyword"
          - "Commit secrets to git"
          - "Skip code reviews"
        domain_knowledge: |
          E-Commerce Platform for Acme Corp
          Payment processing with Stripe and PayPal
          Microservices architecture with Node.js and React
          Kubernetes deployment on AWS EKS

# RELATED FILES
related_files:
  producer:
    - "myDex/.dex/config/onboarding-questions.yaml"
    - ".dexCore/core/agents/mydex-agent.md"
    - "myDex/.dex/config/profile.yaml.example"

  consumer:
    - ".dexCore/core/tasks/workflow.xml"
    - "All 39 agents in .dexCore/core/agents/, .dexCore/dxm/agents/, .dexCore/dis/agents/"

  validation:
    - ".dexCore/_dev/tools/validate_profile_schema.py"

  documentation:
    - ".dexCore/_dev/docs/PROFILE-SCHEMA-GUIDE.md"
    - ".dexCore/_dev/DEVELOPMENT-QUALITY-STANDARDS.md"
    - ".dexCore/_dev/learnings/PROFILE-SCHEMA-MISMATCH-2025-11-16.md"

# NOTES
notes:
  - "This schema is the SINGLE SOURCE OF TRUTH for profile structure"
  - "Producer MUST validate before saving, Consumer MUST validate on load"
  - "Integration test validates end-to-end flow"
  - "communication.language_preference and communication.verbosity are aliases for backward compatibility"
  - "work.company and work.team are placeholders for V1.3 multi-tier profiles"
  - "Schema version MUST be checked on both producer and consumer side"
