# Brainstorm Project Workflow Configuration
name: "brainstorm-project"
description: "Facilitate project brainstorming sessions by orchestrating the DIS brainstorming workflow with project-specific context and guidance."

# Critical variables load from config_source
config_source: "{project-root}/.dexCore/dxm/config.yaml"
draft_folder: "{config_source}:draft_folder"
user_name: "{config_source}:user_name"
date: system-generated

# Module path and component files
installed_path: "{project-root}/.dexCore/dxm/workflows/1-analysis/brainstorm-project"
template: false
instructions: "{installed_path}/instructions.md"

# Context document for project brainstorming
project_context: "{installed_path}/project-context.md"

# CORE brainstorming workflow to invoke
core_brainstorming: "{project-root}/.dexCore/core/workflows/brainstorming/workflow.yaml"
