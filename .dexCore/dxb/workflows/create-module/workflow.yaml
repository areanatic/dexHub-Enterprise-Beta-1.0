# Build Module Workflow Configuration
name: create-module
description: "Interactive workflow to build complete DEX modules with agents, workflows, tasks, and installation infrastructure"

# Critical variables load from config_source
config_source: "{project-root}/.dexCore/dxb/config.yaml"
draft_folder: "{config_source}:draft_folder"
custom_module_location: "{config_source}:custom_module_location"
communication_language: "{config_source}:communication_language"
user_name: "{config_source}:user_name"
date: system-generated

# Reference guides for module building
module_structure_guide: "{installed_path}/module-structure.md"
installer_templates: "{installed_path}/installer-templates/"

# Use existing build workflows
agent_builder: "{project-root}/.dexCore/dxb/workflows/create-agent/workflow.yaml"
workflow_builder: "{project-root}/.dexCore/dxb/workflows/create-workflow/workflow.yaml"
brainstorming_workflow: "{project-root}/.dexCore/core/workflows/brainstorming/workflow.yaml"
brainstorming_context: "{installed_path}/brainstorm-context.md"

# Optional docs that help understand module patterns
recommended_inputs:
  - module_brief: "{draft_folder}/module-brief-*.md"
  - brainstorming_results: "{draft_folder}/brainstorming-*.md"
  - dxm_module: "{project-root}/.dexCore/dxm/"
  - dis_module: "{project-root}/.dexCore/dis/"
  - existing_agents: "{project-root}/.dexCore/*/agents/"
  - existing_workflows: "{project-root}/.dexCore/*/workflows/"

# Module path and component files
installed_path: "{project-root}/.dexCore/dxb/workflows/create-module"
template: false # This is an interactive scaffolding workflow
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# Output configuration - creates entire module structure
# Save to custom_module_location/{{module_code}}
installer_draft_folder: "{custom_module_location}/{{module_code}}"
