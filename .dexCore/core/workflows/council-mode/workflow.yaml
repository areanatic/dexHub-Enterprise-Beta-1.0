# Council Mode - Multi-Agent Expert Council Workflow
name: "council-mode"
description: "Orchestrates group discussions between all installed DEX agents, enabling natural multi-agent conversations"

# Critical data sources - manifest and config overrides
agent_manifest: "{project-root}/.dexCore/_cfg/agent-manifest.csv"
agent_overrides: "{project-root}/.dexCore/_cfg/agents/*.customize.yaml"
date: system-generated

# This is an interactive action workflow - no template output
template: false
instructions: "{project-root}/.dexCore/core/workflows/council-mode/instructions.md"

# Exit conditions
exit_triggers:
  - "*exit"
  - "end council mode"
  - "stop council mode"

web_bundle: false
