# ─────────────────────────────────────────────────────────────────────────
# MIGRATION NOTES (v4.3 → v5.0)
# ─────────────────────────────────────────────────────────────────────────

migration:
  from_version: "4.3"
  to_version: "5.0"
  breaking_changes: false
  profile_schema_changes: "additive only (new company.* fields)"

  bug_fixes_in_transition:
    - bug: "Q21/Q22 dual-labeling in profile.yaml.example"
      resolution: "Fixed in v4.3 profile.yaml.example same commit as v5.0 draft — removed stale labels"
    - bug: "Q40-42 incorrectly listed in v4.3 SMART (per variants.smart.questions = [..., 40, 41, 42])"
      resolution: "v5.0 SMART is [0, 1, 3, 4, 43] — 5 questions only; Q40-41 moved to VOLLSTÄNDIG; Q42 moved to progressive disclosure"

  path_for_existing_users:
    - "Existing v4.3 profiles remain valid — schema is additive"
    - "First session after v5.0 activation: DexMaster asks Q43 (data_handling_policy) to enable Enterprise features. Can skip."
    - "User can opt into VOLLSTÄNDIG v5.0 anytime via *mydex-advanced to fill enterprise fields + personal instructions"

  deprecation_schedule:
    - "v4.3 archived 2026-04-22 session 10 P0-I Option A (see .dexCore/_archive/onboarding-v4.3-2026-04-22/)"
    - "v5.0 is the only canonical onboarding path in 1.0 (SMART / VOLLSTÄNDIG / MINIMAL variants)"
    - "v4.3 restore possible from archive if ever needed — procedure in archive MANIFEST.md"

# ─────────────────────────────────────────────────────────────────────────
# OPEN DESIGN QUESTIONS (for future iteration)
# ─────────────────────────────────────────────────────────────────────────

