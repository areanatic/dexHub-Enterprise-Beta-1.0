        label_en: "Architect (Design + Strategy)"
      - value: product_manager
        label_de: "Product Manager (Requirements + Roadmap)"
        label_en: "Product Manager (Requirements + Roadmap)"
      - value: designer
        label_de: "Designer (UX/UI)"
        label_en: "Designer (UX/UI)"
