# DexHub myDex Onboarding Questions — v5.0 Draft
# ================================================
# Status: DRAFT / experimental — parallel to v4.3 shipped default
# Pair with: .dexCore/_dev/docs/ONBOARDING-DESIGN.md
# Registered in: .dexCore/_cfg/features.yaml as onboarding.smart_v5 + onboarding.vollstandig_v5
#
# Principle: Ask only what can't be inferred. Cut the 42-question wall.
#
# Three-layer model:
#   Layer A — Asked explicitly (5-6 questions, SMART core)
#             Things that can NOT be inferred from repo
#   Layer B — Inferred and confirmed (15-20 items, post-SMART)
#             Auto-detect from repo, show as "I see X — confirm?"
#             Deferred implementation — needs repo-scanner logic (Phase 5.2+)
#   Layer C — Progressive disclosure (asked only when needed)
#             Asked when user first triggers gating feature
#             Deferred implementation — needs event-hook system (Phase 5.2+)
#   Layer D — VOLLSTÄNDIG as opt-in full survey (keeps 42Q for engagement mode)
#
# Competitor baseline (2026): Cursor/Copilot/Continue.dev/Cody/Claude Code all ask ZERO
# structured questions. DexHub v5.0 asks 5. That is still a differentiator
# (structured YAML + schema + verbosity propagation) but no longer an over-ask.

metadata:
  version: "5.0"
  date: "2026-04-19"
  status: "experimental"
  predecessor: "v4.3"
  variants:
    smart_v5:
      question_count: 5
      time_estimate: "60-90 seconds"
      description: "Essential personalization + P0 enterprise gate — fast, humane"
      questions: [0, 1, 3, 4, 43]  # name, language, experience, team_size, data_handling_policy
    vollstandig_v5:
      question_count: 12
      time_estimate: "3-5 minutes"
      description: "SMART + all 7 enterprise compliance fields for regulated deployments"
      questions: [0, 1, 3, 4, 43, 44, 45, 46, 47, 48, 49, 40, 41]
      note: "Q40-41 kept for custom instructions power users; Q42 moved to progressive disclosure"
    minimal_v5:
      question_count: 2
      time_estimate: "30 seconds"
      description: "Bare minimum to proceed: language + consent posture"
      questions: [1, 43]
    legacy_v4_3:
      ref: onboarding-questions.yaml
      status: "supported"
      note: "Full 42-question survey preserved as opt-in engagement mode. Users who want deep profile can still run it via *mydex-advanced."

  enterprise_compliance:
    smart_contains_p0_gate: true
    gate_question_id: 43
    gate_field: "company.data_handling_policy"
    gate_reason: "P0 per ENTERPRISE-COMPLIANCE.md §3.1 — locks cloud-LLM vs local-only decision, all downstream features filter against this"

# ─────────────────────────────────────────────────────────────────────────
# LAYER A — Asked explicitly (cannot infer from repo)
# ─────────────────────────────────────────────────────────────────────────

questions:
  # Q0 — Personalization (KEEP from v4.3)
  - id: 0
    category: personalization
    text_de: "Wie möchtest du angesprochen werden?"
    text_en: "What should we call you?"
    type: text
    required: true
    variants: [smart_v5, vollstandig_v5]
    placeholder_de: "Dein Name oder Nickname..."
    placeholder_en: "Your name or nickname..."
    help_text_de: "Du kannst deinen echten Namen oder einen Nickname verwenden."
    help_text_en: "You can use your real name or a nickname."
    profile_path: "personalization.name"
    layer: "A"
    inferrable: false
    reason_for_asking: "User choice of how they want to be addressed cannot be inferred"

  # Q1 — Language (KEEP from v4.3)
  - id: 1
    category: personalization
    text_de: "In welcher Sprache möchtest du mit DexHub arbeiten?"
    text_en: "Which language would you like to use with DexHub?"
    type: single_select
    required: true
    variants: [smart_v5, vollstandig_v5, minimal_v5]
    options:
      - value: de
        label_de: "Deutsch 🇩🇪"
        label_en: "Deutsch 🇩🇪"
      - value: en
        label_de: "English 🇬🇧"
        label_en: "English 🇬🇧"
      - value: bilingual
        label_de: "Bilingual 🌍 (Mix je nach Kontext)"
        label_en: "Bilingual 🌍 (Mix based on context)"
    profile_path: "personalization.language"
    layer: "A"
    inferrable: false
    reason_for_asking: "Interaction language is a user preference"

  # Q3 — Experience level (KEEP from v4.3 — depth calibration)
  - id: 3
    category: identity
    text_de: "Wie viele Jahre Erfahrung hast du in deinem Bereich?"
    text_en: "How many years of experience do you have in your field?"
    type: single_select
    required: true
    variants: [smart_v5, vollstandig_v5]
    options:
      - value: "0-2"
        label_de: "0-2 Jahre (Junior)"
        label_en: "0-2 years (Junior)"
      - value: "3-7"
        label_de: "3-7 Jahre (Mid-Level)"
        label_en: "3-7 years (Mid-Level)"
      - value: "8-15"
        label_de: "8-15 Jahre (Senior)"
        label_en: "8-15 years (Senior)"
      - value: "15+"
        label_de: "15+ Jahre (Expert)"
        label_en: "15+ years (Expert)"
    profile_path: "technical.experience_level"
    layer: "A"
    inferrable: false
    reason_for_asking: "Self-reported skill level shapes agent explanation depth; not reliably inferrable from repo (junior may work on senior repos and vice versa)"

  # Q4 — Team size (KEEP — affects coordination patterns)
  - id: 4
    category: identity
    text_de: "Wie groß ist dein Team aktuell?"
    text_en: "What is your current team size?"
    type: single_select
    required: true
    variants: [smart_v5, vollstandig_v5]
    options:
      - value: solo
        label_de: "Ich arbeite allein"
        label_en: "I work alone"
      - value: small
        label_de: "Klein (2-5 Personen)"
        label_en: "Small (2-5 people)"
      - value: medium
        label_de: "Mittel (6-15 Personen)"
        label_en: "Medium (6-15 people)"
      - value: large
        label_de: "Groß (16+ Personen)"
        label_en: "Large (16+ people)"
    profile_path: "identity.team_size"
    layer: "A"
    inferrable: "partial"
    reason_for_asking: "Team-context shapes agent coordination (solo → no handoff prompts, large → more structured). Partially inferrable from git log author count, but user-reported is more accurate"

  # ─────────────────────────────────────────────────────────────────────────
  # LAYER A — NEW: Enterprise Compliance P0 Gate
  # ─────────────────────────────────────────────────────────────────────────

  # Q43 — NEW: Data-handling policy (the P0 enterprise gate)
  - id: 43
    category: enterprise
    text_de: "Welche Datenschutz-Richtlinie gilt in deinem Kontext?"
    text_en: "What data-handling policy applies to your context?"
    type: single_select
    required: true
    variants: [smart_v5, vollstandig_v5, minimal_v5]
    options:
      - value: local_only
        label_de: "Alles muss lokal bleiben (keine Cloud, keine API-Calls außerhalb)"
        label_en: "Everything stays local (no cloud, no outside API calls)"
      - value: lan_only
        label_de: "Nur Firmennetzwerk erlaubt (LAN/VPN, kein öffentliches Internet)"
        label_en: "Corporate network only (LAN/VPN, no public internet)"
      - value: cloud_llm_allowed
        label_de: "Cloud-LLMs erlaubt (Copilot, Claude API, etc.)"
        label_en: "Cloud LLMs allowed (Copilot, Claude API, etc.)"
      - value: hybrid
        label_de: "Hybrid (Code lokal, LLM-Auswahl fall-basiert)"
        label_en: "Hybrid (code local, LLM choice case-by-case)"
    help_text_de: "Diese Antwort entscheidet, welche Features DexHub anbietet. 'Lokal' deaktiviert Cloud-Connectors und erzwingt Ollama."
    help_text_en: "This answer determines which features DexHub offers you. 'Local' disables cloud connectors and forces Ollama."
    profile_path: "company.data_handling_policy"
    layer: "A"
    inferrable: false
    reason_for_asking: "P0 enterprise gate — sets feature-filter for all downstream LLM/connector/parser features. Cannot be inferred, must be explicitly stated"
    enterprise_compliance: P0
    enforces:
      - "When local_only: llm.copilot_primary = disabled; llm.claude_code = disabled; llm.ollama_local = recommended"
      - "When lan_only: connectors.figma_wizard = disabled; connectors.atlassian_wizard = filtered to on-prem only"
      - "When cloud_llm_allowed: all features available with per-connector consent"
      - "When hybrid: user confirms per-feature at first use"

  # ─────────────────────────────────────────────────────────────────────────
  # LAYER A — VOLLSTÄNDIG: additional enterprise compliance (Q44-Q49)
  # ─────────────────────────────────────────────────────────────────────────

  # Q44 — NEW: Approved LLM providers
  - id: 44
    category: enterprise
    text_de: "Welche LLM-Provider sind in deinem Kontext freigegeben?"
    text_en: "Which LLM providers are approved in your context?"
    type: multi_select
    required: false
    variants: [vollstandig_v5]
    options:
      - value: ollama_local
        label_de: "Ollama (vollständig lokal)"
        label_en: "Ollama (fully local)"
      - value: copilot_enterprise
        label_de: "GitHub Copilot Enterprise (mit Firmen-Tenant)"
        label_en: "GitHub Copilot Enterprise (with corp tenant)"
      - value: claude_api
        label_de: "Anthropic API (mit Firmen-Key)"
        label_en: "Anthropic API (with corp key)"
      - value: openai_public
        label_de: "OpenAI public API"
        label_en: "OpenAI public API"
      - value: none
        label_de: "Noch nichts freigegeben — bitte später konfigurieren"
        label_en: "Nothing approved yet — configure later"
    profile_path: "company.approved_llm_providers"
    layer: "A"
    inferrable: false
    reason_for_asking: "Captures actionable consent, not aspiration. Locks which LLM integrations DexHub surfaces"
    enterprise_compliance: P0

  # Q45 — NEW: Available connectors
  - id: 45
    category: enterprise
    text_de: "Welche Tool-Integrationen sind freigegeben und erreichbar?"
    text_en: "Which tool integrations are approved and reachable?"
    type: multi_select
    required: false
    variants: [vollstandig_v5]
    options:
      - value: github_enterprise
        label_de: "GitHub Enterprise"
        label_en: "GitHub Enterprise"
      - value: atlassian_cloud
        label_de: "Atlassian Cloud (Jira/Confluence)"
        label_en: "Atlassian Cloud (Jira/Confluence)"
      - value: atlassian_server
        label_de: "Atlassian Server/DC (on-prem)"
        label_en: "Atlassian Server/DC (on-prem)"
      - value: figma
        label_de: "Figma"
        label_en: "Figma"
      - value: internal_git
        label_de: "Internes Git (nicht GitHub/GitLab)"
        label_en: "Internal Git (not GitHub/GitLab)"
      - value: none
        label_de: "Keine — nur lokaler Git"
        label_en: "None — local Git only"
    profile_path: "company.available_connectors"
    layer: "A"
    inferrable: false
    reason_for_asking: "Connector wizards currently offer integrations that may not be reachable in the user's context. This filters the menu"
    enterprise_compliance: P0

  # Q46 — NEW: Audit requirements
  - id: 46
    category: enterprise
    text_de: "Gelten für dich Audit- oder Compliance-Anforderungen?"
    text_en: "Do audit or compliance requirements apply to you?"
    type: single_select
    required: false
    variants: [vollstandig_v5]
    options:
      - value: not_required
        label_de: "Nicht notwendig"
        label_en: "Not required"
      - value: local_logs_only
        label_de: "Nur lokale Logs (Chronicle)"
        label_en: "Local logs only (Chronicle)"
      - value: soc2
        label_de: "SOC 2"
        label_en: "SOC 2"
      - value: iso27001
        label_de: "ISO 27001"
        label_en: "ISO 27001"
      - value: hipaa
        label_de: "HIPAA"
        label_en: "HIPAA"
      - value: dhl_supply_chain
        label_de: "DHL Supply Chain Standard"
        label_en: "DHL Supply Chain Standard"
      - value: other
        label_de: "Andere (in Custom Instructions vermerken)"
        label_en: "Other (note in custom instructions)"
    profile_path: "company.audit_requirements"
    layer: "A"
    inferrable: false
    reason_for_asking: "Drives whether DexHub must produce audit trails, signed commits, session logs of a specific format"
    enterprise_compliance: P0

  # Q47 — NEW: Network topology
  - id: 47
    category: enterprise
    text_de: "Wie sieht dein Netzwerk-Zugang aus?"
    text_en: "What is your network access like?"
    type: single_select
    required: false
    variants: [vollstandig_v5]
    options:
      - value: direct_internet
        label_de: "Direkter Internet-Zugang"
        label_en: "Direct internet access"
      - value: corporate_proxy
        label_de: "Firmen-Proxy (mit Authentifizierung)"
        label_en: "Corporate proxy (with auth)"
      - value: vpn_required
        label_de: "VPN erforderlich für externe Calls"
        label_en: "VPN required for external calls"
      - value: air_gapped
        label_de: "Air-Gapped (keine externen Calls möglich)"
        label_en: "Air-gapped (no external calls possible)"
      - value: hybrid
        label_de: "Hybrid (je nach Context)"
        label_en: "Hybrid (context-dependent)"
    profile_path: "company.network_topology"
    layer: "A"
    inferrable: false
    reason_for_asking: "Affects every outbound call (MCP connectors, model APIs)"
    enterprise_compliance: P1

  # Q48 — NEW: Compliance certifications
  - id: 48
    category: enterprise
    text_de: "Welche Compliance-Zertifizierungen sind für dich relevant?"
    text_en: "Which compliance certifications apply to you?"
    type: multi_select
    required: false
    variants: [vollstandig_v5]
    options:
      - value: gdpr
        label_de: "GDPR / DSGVO"
        label_en: "GDPR"
      - value: hipaa
        label_de: "HIPAA"
        label_en: "HIPAA"
      - value: sox
        label_de: "SOX"
        label_en: "SOX"
      - value: iso27001
        label_de: "ISO 27001"
        label_en: "ISO 27001"
      - value: pci_dss
        label_de: "PCI DSS"
        label_en: "PCI DSS"
      - value: none
        label_de: "Keine"
        label_en: "None"
    profile_path: "company.compliance_certifications"
    layer: "A"
    inferrable: false
    reason_for_asking: "Regulation-specific constraints (GDPR = residency, HIPAA = no cloud-LLM without BAA)"
    enterprise_compliance: P1

  # Q49 — NEW: Forbidden git targets
  - id: 49
    category: enterprise
    text_de: "Gibt es Git-Remotes, die absolut nicht gepusht werden dürfen?"
    text_en: "Are there git remotes that absolutely must not be pushed to?"
    type: text_list
    required: false
    variants: [vollstandig_v5]
    placeholder_de: "z.B. git.firma.com/archiv/* (mit SHOULD_FAIL_PUSH markieren)"
    placeholder_en: "e.g. git.company.com/archive/* (mark with SHOULD_FAIL_PUSH)"
    help_text_de: "DexHub warnt explizit, wenn ein markierter Remote als Push-Ziel erkannt wird. Verhindert Datenverlust durch Fehl-Pushes zu Legacy-Repos."
    help_text_en: "DexHub will explicitly warn if a marked remote is detected as a push target. Prevents data loss through misrouted pushes to legacy repos."
    profile_path: "company.forbidden_git_targets"
    layer: "A"
    inferrable: false
    reason_for_asking: "Prevents accidental pushes to tombstoned/enterprise targets (e.g. azamani1 was tombstoned)"
    enterprise_compliance: P1

  # ─────────────────────────────────────────────────────────────────────────
  # LAYER A — VOLLSTÄNDIG: Power-user custom instructions (KEEP from v4.3)
  # ─────────────────────────────────────────────────────────────────────────

  - id: 40
    category: custom_instructions
    text_de: "Hast du 'always do' Regeln, die alle Agents beachten sollen?"
    text_en: "Do you have 'always do' rules all agents should follow?"
    type: text_list
    required: false
    variants: [vollstandig_v5]
    max_items: 20
    placeholder_de: |
      Beispiele (Technik + Persönlichkeit gemischt):
        • "Verwende TypeScript strict mode"
        • "Commit-Messages nach Conventional Commits"
        • "Sprich mit mir auf Schwäbisch" (oder Bayerisch, Sächsisch, jeder Dialekt)
        • "Nutze Emojis sparsam — max. 1 pro Antwort"
        • "Code-Kommentare immer auf Englisch, Erklärungen auf Deutsch"
        • "Beispiele bevorzugt aus der Musik-Domäne"
    placeholder_en: |
      Examples (technical + personal mixed):
        • "Use TypeScript strict mode"
        • "Follow Conventional Commits for git messages"
        • "Speak like a Shakespeare character" (or any tone/style preference)
        • "Keep emoji use minimal — max 1 per response"
        • "Code comments in English, explanations in German"
        • "Prefer examples from the music domain"
    profile_path: "custom_instructions.always_do"
    layer: "A"
    inferrable: false
    reason_for_asking: "Explicit user rules — not inferrable from repo. Personal style + tone are as valid here as technical conventions; agents apply both."

  - id: 41
    category: custom_instructions
    text_de: "Hast du 'never do' Regeln?"
    text_en: "Do you have 'never do' rules?"
    type: text_list
    required: false
    variants: [vollstandig_v5]
    max_items: 20
    placeholder_de: |
      Beispiele:
        • "Verwende kein var keyword"
        • "Keine Abkürzungen ohne Erklärung beim ersten Vorkommen"
        • "Nie duzen in offiziellen Dokumenten"
        • "Keine Emojis in Commit-Messages"
        • "Keine Fachbegriffe ohne deutsche Übersetzung daneben"
    placeholder_en: |
      Examples:
        • "Never use var keyword"
        • "No abbreviations without explanation on first use"
        • "No emojis in commit messages"
        • "No jargon without a plain-English translation alongside"
    profile_path: "custom_instructions.never_do"
    layer: "A"
    inferrable: false
    reason_for_asking: "Explicit user rules. Same scope as always_do — technical conventions + personal preferences both welcome."

# ─────────────────────────────────────────────────────────────────────────
# LAYER B — Inferred and confirmed (DEFERRED to Phase 5.2+)
# ─────────────────────────────────────────────────────────────────────────
# These items are NOT asked during onboarding in v5.0.
# They will be auto-detected from repo scanning and confirmed to user
# in a post-SMART batch confirmation dialog.
# Implementation requires a repo-scanner module (future phase).

inferred_layer_b_candidates:
  - profile_path: "tech.primary_language"
    infer_from: "file extensions + lock files (package.json, requirements.txt, go.mod, Cargo.toml)"
  - profile_path: "tech.primary_framework"
    infer_from: "dependency manifests"
  - profile_path: "tech.test_framework"
    infer_from: "test configs + test file patterns"
  - profile_path: "tech.build_tool"
    infer_from: "webpack/vite/tsconfig/build.gradle/Makefile"
  - profile_path: "tech.package_manager"
    infer_from: "package-lock.json / pnpm-lock.yaml / yarn.lock / Pipfile.lock"
  - profile_path: "tech.commit_style"
    infer_from: "git log analysis (conventional commits detection)"
  - profile_path: "tech.linting_tool"
    infer_from: ".eslintrc / .prettierrc / ruff.toml presence"
  - profile_path: "identity.team_size_inferred"
    infer_from: "git log unique author count over last 90 days"
  - profile_path: "work.domain_inferred"
    infer_from: "directory structure heuristics (web/mobile/backend/data/ml)"

# ─────────────────────────────────────────────────────────────────────────
# LAYER C — Progressive disclosure (DEFERRED to Phase 5.2+)
# ─────────────────────────────────────────────────────────────────────────
# These questions are asked ONLY when the user first triggers a feature
# that needs the answer. Not during initial onboarding.

progressive_disclosure_triggers:
  - trigger: "first MCP connector install"
    ask: "Do you have VPN access? What's your tenant URL?"
  - trigger: "first parser use"
    ask: "Is local-only OCR required?"
  - trigger: "first push"
    ask: "Which git targets are approved?"
  - trigger: "first multi-agent workflow"
    ask: "Do you want sequential or parallel agent coordination?"
  - trigger: "first persona switch"
    ask: "Role-detail questions (domain, preferred level of initiative)"

# ─────────────────────────────────────────────────────────────────────────
# COMPLETION SUMMARY + EDIT-HINT (P0-G)
# ─────────────────────────────────────────────────────────────────────────
# After the last answered question, mydex-agent MUST:
#   1. Display a compact summary of collected answers (name, language,
#      experience, team-context, data-handling-policy, optional custom
#      instructions)
#   2. Confirm the target file path: myDex/.dex/config/profile.yaml
#   3. Tell the user: "Du kannst dein Profil jederzeit ändern:
#      *mydex-profile zum Editieren, *mydex-advanced für mehr Felder
#      (Enterprise-Compliance, custom instructions)."
#   4. Offer: "Willst du jetzt noch was ändern? [ja / nein]" — on 'ja'
#      re-ask the question the user points to, otherwise write profile.

completion_summary:
  show_after: "last_variant_question"
  format: "bilingual per communication_language"
  required_fields_in_summary:
    - identity.name (Q0)
    - identity.communication_language (Q1)
    - identity.experience_years (Q3)
    - identity.team_size_context (Q4)
    - company.data_handling_policy (Q43)
  optional_fields_if_asked:
    - company.approved_llm_providers (Q44, vollstandig_v5)
    - company.available_connectors (Q45, vollstandig_v5)
    - custom_instructions.always_do (Q40, vollstandig_v5)
    - custom_instructions.never_do (Q41, vollstandig_v5)
  edit_hint_de: |
    Dein Profil ist gespeichert in myDex/.dex/config/profile.yaml.

    Editieren jederzeit via:
      *mydex-profile      → Felder ändern
      *mydex-advanced     → auf VOLLSTÄNDIG umsteigen (+ Enterprise-Felder + persönliche Instructions)
      *mydex-minimal      → auf das MINIMUM reduzieren

    Alles bleibt lokal — nichts wird automatisch synchronisiert.
  edit_hint_en: |
    Your profile is saved in myDex/.dex/config/profile.yaml.

    Edit anytime via:
      *mydex-profile      → change fields
      *mydex-advanced     → switch to VOLLSTÄNDIG (+ enterprise fields + personal instructions)
      *mydex-minimal      → downgrade to the minimal set

    Everything stays local — nothing auto-syncs.

