  - id: quality.walkthrough_complete_only
    name: "Complete-Only Path — Preserve-Existing (Tier 5.5.2, choice 1)"
    description: "The data-preservation path: user has partial profile, picks '1 Profil vervollständigen', agent asks ONLY the missing questions. New answers added, existing answers survive. Unique to this test: hash EXPECTED to change (additive update), strict assertions on field-level preservation of TestUser09 name + de language + addition of experience/team/data_handling fields. Structural: mydex-agent.md has 'Load profile, determine missing questions, start Q&A with only missing'. Live (opt-in): fixture with 2/5 filled + ~7 turns."
    status: enabled
    phase: 5.1.c-tier5.5.2
    enterprise_compliance: cloud_with_consent
    requires: [claude-code]
    depends_on: [quality.walkthrough_existing_profile_edge, quality.walkthrough_smart_v5_full]
    docs: tests/e2e/09-onboarding-complete-only.test.sh + tests/e2e/README.md
    tests:
      - tests/e2e/integrations/claude-code/09-onboarding-complete-only.test.sh
    known_issues:
      - "Tolerant on question order — agent may ask Q3/Q4/Q43 in any sequence. Answers (3-7/allein/Cloud-LLMs) work across all orderings."
      - "Save-confirmation turn 8 is conservative — some flows may auto-save without prompting. Harmless if not prompted."

  - id: quality.walkthrough_overwrite_reject_confirm
    name: "Overwrite Confirm-Gate Reject Path (Tier 5.5.3)"
    description: "Companion to walkthrough_existing_profile_edge. Goes ONE level deeper: user picks '2 Neu beginnen' → confirm-gate fires ('Sicher? Aktuelles Profil wird überschrieben. [j/n]') → user answers 'n' → profile MUST survive unchanged. Structural: mydex-agent.md has confirm-gate wording + branch logic. Live (opt-in): 5 turns + SHA-256 equality check pre-confirm AND post-reject. Catches a class of safety bug test 06 cannot: confirm-gate bypassed before user answers."
    status: enabled
    phase: 5.1.c-tier5.5
    enterprise_compliance: cloud_with_consent
    requires: [claude-code]
    depends_on: [quality.walkthrough_existing_profile_edge, quality.walkthrough_multi_turn]
