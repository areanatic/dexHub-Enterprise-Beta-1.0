  - id: parser.inbox_auto_parse
    name: "Inbox Auto-Parse Orchestrator (inbox-auto-parse.sh + *inbox menu)"
    description: "Shipped Phase 5.3.f first slice (2026-04-21). `.dexCore/core/parser/inbox-auto-parse.sh` iterates all pending files in the configured inbox (precedence: --inbox flag > $DEXHUB_INBOX env > config.yaml inbox_folder > default myDex/inbox/), routes each through parse-route.sh, invokes the right backend adapter (kreuzberg / ollama_vlm / native), pipes extracted text into l2-ingest.sh for L2 Tank ingestion, then ARCHIVES the original to `<inbox>/.processed/<timestamp>-<name>` (never silently deletes). Per-file JSON records surface success/failure + extract bytes + archive path. Dual-env tested (BACKEND-ADAPTER-PATTERN.md §142-157). DexMaster `*inbox` menu item wraps the script for conversational UX. Flags: --dry-run / --no-archive / --one-file / --inbox / --format json|text. This slice makes the Parser arc END-TO-END USABLE — drop a file, run the script, it's in the Tank."
    status: enabled
    phase: 5.3.f
    enterprise_compliance: ok
    requires: [bash, ruby, sqlite3]
    depends_on: [parser.router, parser.capabilities_yaml, knowledge.l2_tank_ingest]
    docs: myDex/drafts/CONCEPT-PARSER-USER-JOURNEY.md
    tests:
      - tests/e2e/26-parser-inbox-auto-parse.test.sh
    primary_target: github_copilot
    known_issues:
      - "One-shot mode only — no file-system watcher. User must run the script (or DexMaster *inbox) manually. Continuous watching (fswatch on macOS / inotify on Linux) is a deferred enhancement."
      - "Binary files whose backend is not installed return status=routed_but_backend_unavailable. They're NOT archived (stay in inbox for retry after the user installs the backend). This is intentional — don't penalize users for a deferred install."
      - "Kreuzberg/ollama_vlm adapter failures during extract surface as status=extract_failed with the backend's exit code in the error field. l2-ingest failures surface as status=ingest_failed with stderr excerpt."
      - "For very large inboxes (100s of files), the for-loop processes sequentially. Future --parallel N flag could speed this up. Not a blocker for Beta 1.0 scale."
      - "Fixed 2026-04-21 session-7: l2-query now shows the archive path (myDex/inbox/.processed/<ts>-<name>) as source_path, not the ephemeral tmp file. Done via new l2-ingest --source-display flag that overrides source_path for DB storage. The timestamp + basename used for --source-display is reused for the actual archive mv, so DB reference matches on-disk file."

  - id: parser.inbox_shortcut_setup
    name: "Inbox Desktop-Shortcut Setup (inbox-setup.sh + *inbox-setup menu)"
    description: "Shipped Phase 5.3.h first slice (2026-04-22). .dexCore/core/parser/inbox-setup.sh creates (or removes) a Desktop shortcut pointing at the configured inbox, so users can drop files in with a drag-and-drop instead of navigating the repo tree. Platform-specific: macOS → symlink at ~/Desktop/<name> (Finder renders shortcut-arrow badge); Linux → .desktop Type=Link file at ~/Desktop/<name>.desktop (GNOME/KDE/XFCE/Cinnamon compatible); Windows → deferred to 1.1 roadmap (needs PowerShell .lnk COM recipe). Reversible via --remove. Idempotent: re-run without --force returns exit 5 and touches nothing. Honors --inbox override, --name custom, --dry-run plan-only, --format json|text. Uses the same inbox-resolution precedence as inbox-auto-parse.sh (flag > env > config.yaml > default). Only touches ~/Desktop/<name> — no repo writes, no package-manager invocations, no TCC/Automation prompts on macOS. Closes the session-6 known_issue on parser.inbox_auto_parse about desktop-shortcut creation."
    status: enabled
    phase: 5.3.h
    enterprise_compliance: ok
    requires: [bash, ruby]
    depends_on: []
    docs: myDex/drafts/CONCEPT-PARSER-USER-JOURNEY.md
    tests:
      - tests/e2e/27-parser-inbox-shortcut.test.sh
    primary_target: github_copilot
    known_issues:
      - "Windows .lnk support shipped 2026-04-21 session-7 TODO #6. Uses PowerShell (pwsh.exe or powershell.exe) + WScript.Shell COM to create a proper .lnk file on the user's Desktop. Converts bash↔Windows paths via cygpath when available (Git Bash / MSYS2 / Cygwin), falls back to bash-style paths (works on WSL where PowerShell handles both). Structural assertions in test 27 (macOS CI can't run PowerShell, so scaffold-presence is verified via grep). Behavioral validation deferred to real Windows testing. Edge case: paths with literal single-quotes need escaping — rare in practice for Desktop/inbox, not handled in this first slice."
      - "Linux Desktop resolution priority (shipped 2026-04-21 session-7 Option 3): XDG_DESKTOP_DIR env var > $XDG_CONFIG_HOME/user-dirs.dirs file parse > $HOME/Desktop default. Handles localized desktop environments (Schreibtisch/Bureau/桌面/デスクトップ) via the user-dirs.dirs layer. Comment lines in user-dirs.dirs are skipped. Previously only env var + hard-coded default — Linux users with localized file managers got 'desktop_missing' false-negative."
      - "macOS shortcut is a symlink, not a Finder Alias. Symlinks render with the curved-arrow badge and open the inbox folder when double-clicked. True Finder Aliases require osascript + Automation permission (TCC prompt) — not worth the friction for Beta 1.0."
      - "Live-verify gated behind CLAUDE_E2E_LIVE_INBOX_SETUP=1 (never touches real ~/Desktop; uses scratch dir via XDG_DESKTOP_DIR + HOME redirect)."

  - id: parser.inbox_watcher
    name: "Inbox Watcher (inbox-watch.sh + *inbox-watch menu)"
    description: "Shipped Phase 5.3.i first slice (2026-04-21 session-7). .dexCore/core/parser/inbox-watch.sh continuously monitors the inbox + auto-processes files as they arrive. Wraps inbox-auto-parse.sh (does not duplicate its logic). Three detection methods auto-selected: fswatch (macOS/BSD, real-time kernel events) > inotifywait (Linux, real-time) > poll (universal fallback, find-based, 10s default). --once for single-pass / cron use, --dry-run for planning, --method override for explicit selection, --interval for poll tuning. Not a daemon — runs in foreground; users who want background use nohup/tmux/screen/systemd-user-service. De-duplication handled by inbox-auto-parse (processing an already-archived file = harmless no-op). Respects the same inbox-resolution precedence as inbox-auto-parse + inbox-setup."
    status: enabled
    phase: 5.3.i
    enterprise_compliance: ok
    requires: [bash, ruby]
    optional_deps: [fswatch, inotify-tools]
    depends_on: [parser.inbox_auto_parse]
    docs: myDex/drafts/CONCEPT-PARSER-USER-JOURNEY.md
    tests:
      - tests/e2e/29-parser-inbox-watch.test.sh
    primary_target: github_copilot
    known_issues:
      - "Not daemonized. Foreground process — Ctrl-C stops. Users backgrounding via nohup/tmux/screen/systemd-user. Native systemd/launchd integration is deferred to 1.1 (scope: parser.inbox_watcher_daemon)."
      - "Windows watch method not yet scaffolded. Current poll-fallback works on Windows bash (Git Bash / MSYS2 / WSL), but a native FileSystemWatcher PowerShell integration would be nicer. Scope: 1.1 (parser.inbox_watcher_windows_native)."
      - "Poll method's 10s default interval is a tradeoff between latency + CPU. Users who drop files rarely can set --interval 60 (still low CPU); users wanting sub-second latency should install fswatch or inotifywait."
      - "No lock file — running two inbox-watch processes against the same inbox is untested. inbox-auto-parse's archive mv is atomic (mv on POSIX is atomic within a filesystem) so race conditions would produce at-most-once processing, not double-processing, but no formal guarantee."

  - id: parser.guided_setup_wizard
    name: "Parser capabilities probe (parser.guided_setup_wizard) — probe-and-write layer"
    description: "Shipped Phase 5.3.g first slice (2026-04-21). .dexCore/core/parser/capabilities-probe.sh iterates every registered backend adapter (kreuzberg, ollama_vlm today), calls each --detect, and merges the results into myDex/.dex/config/capabilities.yaml. Closes the known_issue on both kreuzberg + ollama_vlm backends about 'router does not yet auto-probe'. User-owned fields (notes, preferences) are preserved across re-probes; script-owned fields (installed, version, compliance, last_probe, probe_status) are overwritten per-probe. Never clobbers user-edited YAML that's outside the probe-owned keys. Atomic write via mktemp + mv. Idempotent — re-runs are safe. Conversational wrapper (*parser-setup DexMaster menu entry invoking this script + offering install commands when backends missing) is a follow-up slice."
    status: enabled
    phase: 5.3.g
    enterprise_compliance: ok
    requires: [bash, ruby]
    depends_on: [parser.router, parser.kreuzberg_backend, parser.ollama_vlm_backend]
    docs: .dexCore/_dev/docs/BACKEND-ADAPTER-PATTERN.md
    tests:
      - tests/e2e/25-parser-capabilities-probe.test.sh
    primary_target: github_copilot
    known_issues:
      - "YAML merge uses minimal line-based parser (no yq / Psych dependency). Exotic YAML (anchors, multi-line block scalars, non-standard indent) in capabilities.yaml may not round-trip cleanly. Stick to the template structure and let the probe manage the file; hand-edits should target notes/preferences fields only."
      - "Registered backends are hardcoded in KNOWN_BACKENDS array at the top of capabilities-probe.sh. Adding a new backend requires a script edit. Alternative: discover backends by listing .dexCore/core/parser/backends/*.sh — consider for 5.3.h."
      - "Auto-probe-on-missing wiring SHIPPED 2026-04-21 in parse-route.sh (commit following 2774f79). When capabilities.yaml is missing, the router now invokes capabilities-probe.sh --dry-run and uses the in-memory result. --no-auto-probe opts out for deterministic tests. Still pending: stale-timestamp check (re-probe if last_probe > 24h ago) — low priority, the current behavior 'missing file = probe' is the common first-run case."
      - "Conversational wizard wrapper (*parser-setup DexMaster command) not shipped yet. Today users run `bash capabilities-probe.sh` directly. Chat UX is the second slice under 5.3.g."
      - "Shipped 2026-04-22 session-7 Option E: structured `hint_type` field now emitted alongside `setup_hint` by kreuzberg + ollama_vlm adapters. Vocabulary: ok | install_backend | daemon_unreachable | missing_dependency | policy_blocked | probe_error. BACKEND-ADAPTER-PATTERN.md documents the contract; tests 23 + 24 assert both presence and status↔hint_type consistency."
      - "Fixed 2026-04-21 session-7 TODO #5: upgraded from line-based loader to ruby YAML.safe_load. User-edited notes with internal quote marks, apostrophes, colons, or any YAML-string characters now round-trip cleanly. Emit remains line-based (deterministic + comment-preserving). Falls back to empty-state rebuild on malformed input (same failure-mode as before, so no regression)."

  - id: parser.capabilities_yaml
    name: "capabilities.yaml (backend state tracking) — template shipped"
    description: "Shipped Phase 5.3.a (2026-04-21) as part of parser.router. myDex/.dex/config/capabilities.yaml.example is the tracked in-repo template. Users copy to capabilities.yaml (gitignored — user-owned) and edit as backends get installed. Schema v1 covers parser.backends.{kreuzberg,ollama_vlm,pattern_a_vector_text} with {installed, version, compliance, notes} per backend plus parser.preferences for override knobs. Router reads this file read-only via parse-route.sh --capabilities PATH (default: myDex/.dex/config/capabilities.yaml). Automated maintenance (probe installed backends, write status) ships with parser.guided_setup_wizard (Phase 5.3.g) — today the template + manual edit is the contract."
    status: enabled
    phase: 5.3.a
    enterprise_compliance: ok
    requires: []
    depends_on: []
    docs: myDex/drafts/CONCEPT-DOCUMENT-PARSING-HOLISTIC-V2.md
    tests:
      - tests/e2e/20-parser-router.test.sh
    primary_target: github_copilot
    known_issues:
      - "Manual YAML edits today. guided_setup_wizard (5.3.g) will probe + write automatically; until then users follow the template comments."
      - "Schema v1 only covers parser backends. Future v2 may add other subsystems (e.g. voice backends, connector cache) under top-level keys."

