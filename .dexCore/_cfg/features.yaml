# DexHub Feature-Flag Registry — Source of Truth
# ================================================
#
# Every DexHub capability is declared here as an individual feature with:
#   - status:               always_on | enabled | disabled | deferred | broken | experimental
#   - phase:                which release milestone (1.0 | 1.1 | 5.x.x block ID | future)
#   - enterprise_compliance: ok | local_vlm_required | cloud_with_consent | research_pending | not_applicable
#   - requires:             external tools/binaries needed (comma-separated)
#   - depends_on:           other feature IDs this one requires to be enabled
#   - docs:                 link to design/research doc (myDex/drafts/ or .dexCore/_dev/docs/)
#   - tests:                list of E2E test files proving this works
#
# Status semantics (enforced by validate.sh §23 once added):
#   always_on     — Core infrastructure, cannot be toggled (e.g. DexMaster IDLE state)
#   enabled       — Active, user-visible, has E2E test, works end-to-end
#   disabled      — User-togglable, currently off (opt-in required)
#   deferred      — Planned for later phase, NOT shipped, honest roadmap label
#   broken        — Known-not-working, bug documented in .dexCore/_dev/todos/bugs.md
#   experimental  — Alpha, user opt-in with warning, may change
#
# Rule: README.md MUST NOT claim a feature works unless its status is always_on or enabled.
# Rule: Every enabled feature MUST have at least one test entry.
# Rule: Changes to this file require validate.sh and bash tests/e2e/run-all.sh green before commit.

schema_version: "1.0"
registry_version: "0.2.0"
updated_at: "2026-04-20"
