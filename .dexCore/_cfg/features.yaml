    name: "View-Profile Path (Tier 5.5.4, choice 3)"
    description: "Smallest slice in existing-profile menu. User picks '3 Profil anzeigen' → agent displays content, returns to menu, profile UNCHANGED. Tests that view is a pure read operation — any mutation here would be a bug. Structural: mydex-agent.md has 'Read and display profile.yaml (formatted), return to menu'. Live (opt-in): fixture + 4 turns + hash-equality post-view."
    status: enabled
    phase: 5.1.c-tier5.5.4
