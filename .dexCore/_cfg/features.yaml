# ─────────────────────────────────────────────────────────────────────────
# DOCUMENT PARSER — broken into 7 sub-features, not one block
# ─────────────────────────────────────────────────────────────────────────
parser:
  - id: parser.router
    name: "Tool-Parser-Router (parse-route.sh + detect-mime.sh)"
    description: "Shipped Phase 5.3.a (2026-04-21). Decides which parser backend handles a given file, based on extension-detected type + file size + capabilities.yaml (which backends installed) + profile.company.data_handling_policy (policy gate). Mirrors the proven L2 Tank backend-routing pattern: detect → graceful status → honest hint. Always exits 0 — 'nothing to route' is an answer, not an error. Min-viable decision tree covers text/code/data/email (→ native, always works), pdf (→ kreuzberg if installed, else system pdftotext fallback, else backend_missing), office (→ kreuzberg, or backend_missing), image (→ ollama_vlm, or backend_missing), archive (→ unsupported), unknown (→ unsupported). Large PDFs (≥100MB by default, overridable via --oversize) defer to the pattern_b raster 6-phase pipeline scheduled for roadmap 1.1. Does NOT invoke backends — that's inbox_auto_parse (5.3.f) and individual backend scripts. Does NOT install or probe backends — capabilities.yaml is user-owned (guided_setup_wizard 5.3.g will maintain it). Stable JSON output shape: {file, type, size_bytes, backend, reason, status, policy, hint}."
    status: enabled
    phase: 5.3.a
    enterprise_compliance: ok
    requires: [bash, ruby]
    depends_on: [parser.capabilities_yaml]
    docs: myDex/drafts/CONCEPT-PARSER-ARCHITECTURE.md
    tests:
      - tests/e2e/20-parser-router.test.sh
    primary_target: github_copilot
    known_issues:
      - "Extension-first classification — magic-byte sniffing deferred to 5.3.b+ if real-world usage reveals brittleness. Files without an extension or with mismatched extensions may misroute."
      - "capabilities.yaml uses a minimal grep+awk parser (handles the template layout; hand-crafted multi-level anchors may fall through to defaults = backend missing). Guided wizard (5.3.g) will own schema compliance."
      - "Policy gate today reads profile.company.data_handling_policy but only ollama_vlm backend is 'local_vlm_required' — block-path for cloud backends lights up when real cloud backends (future: cloud OCR) ship."
      - "System-pdftotext fallback assumes poppler-utils present. If not installed, PDFs without kreuzberg → status=backend_missing."
      - "Large-PDF path (≥oversize) returns status=deferred with backend=defer — the pattern_b raster pipeline that actually handles this is 1.1 roadmap."
      - "capabilities.yaml↔PATH inconsistency (2026-04-22 session-7 final-review low-severity finding): if a user hand-edits capabilities.yaml claiming a backend as installed=true while the actual binary is missing from PATH, parse-route trusts the YAML + reports status=ready, but the adapter's own probe self-corrects to not_installed. Graceful fallback works (inbox-auto-parse surfaces extract_failed with adapter error), but diagnostics can be confusing. Fix path: parse-route could re-validate via the adapter's --detect instead of trusting YAML — deferred because it costs an extra shell-out per route call and the current design (capabilities-probe maintains YAML truth) is correct when users don't hand-edit. Low priority."

  - id: parser.kreuzberg_backend
    name: "Kreuzberg backend adapter (parser.kreuzberg_backend) — shell wrapper"
    description: "Shipped Phase 5.3.b first slice (2026-04-21). Thin shell adapter at .dexCore/core/parser/backends/kreuzberg.sh wrapping the Kreuzberg CLI (https://github.com/kreuzberg-dev/kreuzberg — Rust, MIT, 91+ formats). Two modes: --detect probes the binary cheaply (status ∈ {ready, not_installed, probe_failed, blocked}) and --extract PATH runs the parse. Stable JSON contract for both (backend, binary, version, status, setup_hint, supported[], compliance). Follows the L2 Tank adapter pattern: never blocks, always exits 0 by default, --require flag for callers that want hard-fail when backend missing. Install is user-initiated (brew install kreuzberg-dev/tap/kreuzberg OR cargo install kreuzberg-cli OR docker pull) — we never automate it. Docker-only installs are out of scope for this adapter (future --runner docker flag). Behavioral live validation requires install on the target machine; structural adapter surface is test-green without install."
    status: enabled
    phase: 5.3.b
    enterprise_compliance: ok
    requires: [bash, ruby]
    optional_deps: [kreuzberg-cli]
    depends_on: [parser.router]
    docs: myDex/drafts/RESEARCH-KREUZBERG-DEEP-DIVE.md
    tests:
      - tests/e2e/23-parser-kreuzberg-backend.test.sh
    primary_target: github_copilot
    known_issues:
      - "Requires user to install the kreuzberg CLI — we don't automate brew/cargo/pip installs. Without install, --detect reports not_installed and --extract returns a graceful JSON with status=not_installed (exit 0 by default, exit 2 with --require)."
      - "Docker-only installs (ghcr.io/kreuzberg-dev/kreuzberg) not yet supported in the adapter. Future: --runner docker flag."
      - "Live behavioral coverage (actual extract of a real PDF/DOCX) is gated behind CLAUDE_E2E_LIVE_KREUZBERG=1 in test 23 — skipped when adapter status != ready. Default CI runs structural-only."
      - "Auto-probe shipped 2026-04-21 (parser.guided_setup_wizard + parse-route.sh wiring). Router now auto-invokes capabilities-probe.sh when capabilities.yaml is missing — first-run users don't need to hand-edit the file before kreuzberg routing works. --no-auto-probe opts out. Stale-timestamp refresh (re-probe if last_probe > 24h) is a future low-priority polish."

  - id: parser.ollama_vlm_backend
    name: "Ollama VLM Backend adapter (parser.ollama_vlm_backend) — image → text via local vision model"
    description: "Shipped Phase 5.3.c first slice (2026-04-21). Shell adapter at .dexCore/core/parser/backends/ollama-vlm.sh following BACKEND-ADAPTER-PATTERN.md. Takes an image, returns extracted text (descriptions + OCR) via a local Ollama VLM — auto-discovers from a priority list (llama3.2-vision, llava-llama3, llava, bakllava, moondream, minicpm-v, llava-phi3) or honors --model override. Respects OLLAMA_HOST env + --endpoint flag for LAN deployments. compliance: local_vlm_required — design invariant: cloud-VLM fallbacks are a DIFFERENT backend, never silently substituted; caller (router/orchestrator) gates policy. Status vocabulary adds 'partial' (Ollama installed but daemon unreachable OR no VLM pulled) alongside the standard {ready, not_installed, probe_failed, blocked}. Extract uses POST /api/generate with base64 image in images[]; 5-minute curl timeout; returns standard adapter JSON + VLM-specific siblings (model_used, eval_count, total_ms)."
    status: enabled
    phase: 5.3.c
    enterprise_compliance: local_vlm_required
    requires: [bash, ruby, curl]
    optional_deps: [ollama, "vision-model (llama3.2-vision / llava / moondream / …)"]
    depends_on: [parser.router]
    docs: .dexCore/_dev/docs/BACKEND-ADAPTER-PATTERN.md
    tests:
      - tests/e2e/24-parser-ollama-vlm-backend.test.sh
    primary_target: github_copilot
    known_issues:
      - "User must pull a VLM model — we never automate `ollama pull` (4-8 GB download, user decision). Without model, --detect reports status=partial with a concrete hint."
      - "Auto-discovery priority list is hardcoded. Models released after the list was written won't auto-pick; use --model to select newer ones. Future: read from .dexCore/_cfg/vision-models.yaml if the list churns."
      - "Live behavioral coverage via CLAUDE_E2E_LIVE_VLM=1 in test 24 requires a VLM actually pulled on the target machine. Default CI runs structural-only. VLM inference on a 1x1 image is ~5-30s depending on model + hardware."
      - "Auto-probe shipped 2026-04-21 (parser.guided_setup_wizard + parse-route.sh wiring). Router now auto-invokes capabilities-probe.sh when capabilities.yaml is missing — first-run users with Ollama + a VLM model pulled get ollama_vlm routing without hand-editing any YAML. --no-auto-probe opts out for deterministic tests."

  - id: parser.pattern_a_vector_text
    name: "Pattern A — Vector+Text PDF extraction (pdftotext adapter)"
    description: "Shipped 2026-04-22 session-7 (Option C first slice). .dexCore/core/parser/backends/pattern-a-vector-text.sh wraps poppler's pdftotext CLI for fast, layout-preserving text extraction from PDFs that have a text layer (Figma exports, design mockups, PDFs generated from word processors). Role distinct from kreuzberg: kreuzberg handles the full 91+ format catalog with richer layout analysis; pattern_a is PDF-only, faster, smaller-footprint, and ships as the recommended fallback when kreuzberg isn't installed. Emits the full BACKEND-ADAPTER-PATTERN contract (status + setup_hint + hint_type + compliance=ok) and live-verified on developer machine against a generated PDF. Optional sips-based overview PNG (for future Pattern B integration) is deferred — this first slice is text-only."
    status: enabled
    phase: 5.3.d
    enterprise_compliance: ok
    requires: [poppler-utils]
    depends_on: []
    docs:
      - .dexCore/_dev/docs/ADDITIONAL-MULTIMODAL-OVERSIZE-PARSING.md
      - .dexCore/_dev/docs/BACKEND-ADAPTER-PATTERN.md
    tests:
      - tests/e2e/28-parser-pattern-a-backend.test.sh
    primary_target: github_copilot
    known_issues:
      - "Optional sips-based overview PNG is NOT shipped in this first slice — pattern_a produces text-only extraction today. Overview PNG correlation is scope for pattern_b_raster_6phase (1.1 roadmap) where it is architecturally load-bearing."
      - "Only 'pdf' is in the supported[] list. If a user tries --extract on a non-PDF, pdftotext emits an error to stderr which we surface as status=extract_failed. Router should not route non-PDF to this adapter; callers that bypass the router get honest failure, not silent garbage."
      - "Routing precedence: router prefers kreuzberg when installed (richer output), else pattern_a (fast PDF), else legacy native pdftotext fallback. The legacy fallback duplicates pattern_a's core capability — kept for backwards compatibility with users who skipped capabilities-probe. Candidate for removal in 1.1 once everyone's onboarded to capabilities.yaml."
      - "Silent stderr drops on success (2026-04-22 session-7 final-review low-severity finding): when pdftotext exits 0 but writes warnings to stderr (font-decode issues, encoding substitutions), the adapter discards them. Corrupted-text PDFs produce replacement characters that slip through as valid content. Acceptable for the target use case (clean vector PDFs / Figma exports); would matter more for scanned-document PDFs which should go through ollama_vlm anyway. Fix path: surface stderr summary as a 'warnings' field in the success JSON — deferred until real-world data shows it's needed."

