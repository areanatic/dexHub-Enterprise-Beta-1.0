      - "Live assertions use tolerant phrasing matches (bereits|schon|existing|already). Not strict wording checks."

  - id: quality.walkthrough_smart_v5_full
    name: "SMART v5 Full Walkthrough Test (Tier 5.2, opt-in) — VALIDATED 2026-04-20"
