# ─────────────────────────────────────────────────────────────────────────
# KNOWLEDGE LAYER — 3-tier (Wiki / Tank / Chronicle)
# ─────────────────────────────────────────────────────────────────────────
knowledge:
  - id: knowledge.l1_wiki
    name: "L1 Wiki (myDex/.dex/wiki/) — scaffold"
    description: "Scaffold for Markdown truth-files: pattern doc, framework-shipped templates, user-wiki README. Session-start injection pipeline remains deferred (see knowledge.ingest_pipeline, Phase 5.2.d)."
    status: enabled
    phase: 5.2.a
    enterprise_compliance: ok
    requires: []
    depends_on: []
    docs: .dexCore/_dev/docs/L1-WIKI-PATTERN.md
    tests:
      - tests/e2e/04-knowledge-l1-wiki-scaffold.test.sh
    known_issues:
      - "Entries authored here are NOT auto-loaded at session start yet — that's knowledge.ingest_pipeline (5.2.d)"
      - "Templates are recommendations; user can deviate. Validator only checks scaffold existence."

  - id: knowledge.l1_wiki_injection_copilot
    name: "L1 Wiki → GitHub Copilot Injection (Phase 5.2.d wire-copilot)"
    description: "Primary Beta activation of L1 Wiki. SSOT compile step (build-instructions.sh) invokes load-wiki.sh and appends output to .github/copilot-instructions.md. Wiki entries automatically reach every Copilot session. Cap: WIKI_MAX_COPILOT=1000 bytes (balances user room vs 35KB instruction-file limit). Empty wiki = no injection (no pollution on fresh installs). Drift-check includes wiki content in hash."
    status: enabled
    phase: 5.2.d-wire-copilot
    enterprise_compliance: ok
    requires: [bash]
    depends_on: [knowledge.l1_wiki, knowledge.l1_wiki_injection]
    docs: .dexCore/_dev/docs/L1-WIKI-INJECTION.md
    tests:
      - tests/e2e/11-wiki-copilot-injection.test.sh
    primary_target: github_copilot
    known_issues:
      - "Copilot cap (1000 bytes) is conservative. Can be bumped if real wiki usage needs more. Trade-off: total copilot-instructions.md cap (35KB) vs wiki room."
      - "Drift-check is filesystem-state-dependent: if wiki file changes, build output changes, drift check catches it — by design."

  - id: knowledge.l1_wiki_injection_claude_code
    name: "L1 Wiki → Claude Code Injection (optional integration module)"
    description: "Parallel wire for Claude Code integration. SSOT compile step appends wiki content to .claude/CLAUDE.md. Cap: WIKI_MAX_CLAUDE=4096 bytes (more lenient than Copilot due to Claude context-window headroom). Per PLATFORM-POLICY.md, Claude Code is a removable integration module — this feature rides in areanatic dev repo but the CLAUDE.md target is stripped by build-for-enterprise.sh for enterprise pushes."
    status: enabled
    phase: 5.2.d-wire-claude-code
    enterprise_compliance: ok
    requires: [bash]
    depends_on: [knowledge.l1_wiki_injection]
    docs: .dexCore/_dev/docs/L1-WIKI-INJECTION.md
    tests: []
    integration_module: claude-code
    known_issues:
      - "No dedicated test (would be a Claude-tail-specific test in integrations/claude-code/). Structural check via knowledge.l1_wiki_injection_copilot test 11 covers the build-instructions.sh wire that handles both tails."

  - id: knowledge.l1_wiki_injection
    name: "L1 Wiki Session-Start Injection — scaffold (loader layer)"
    description: "Activates knowledge.l1_wiki from authoring-surface to runtime-loadable. Ships .dexCore/core/knowledge/load-wiki.sh which enumerates myDex/.dex/wiki/*.md (skipping README.md + *.template.md + status:archived entries), respects 2KB per-file + 20KB total caps, and outputs a formatted session-prompt block. Platform-specific wiring to Claude Code (via CONTEXT.md or SSOT compile) and Copilot (via copilot-instructions.md compile) is the follow-up slice."
    status: enabled
    phase: 5.2.d-scaffold
    enterprise_compliance: ok
    requires: [bash]
    depends_on: [knowledge.l1_wiki]
    docs: .dexCore/_dev/docs/L1-WIKI-INJECTION.md
    tests:
      - tests/e2e/10-knowledge-l1-wiki-injection.test.sh
    known_issues:
      - "Loader is standalone and testable today. Automatic session-start hookup (Claude Code hook / Copilot SSOT compile step) is Phase 5.2.d-wire follow-up."
      - "No content-quality validation — tool checks size + syntax, not whether an entry is genuinely L1-worthy."
      - "Filesystem-order enumeration: users wanting specific order must prefix filenames (01-foo.md, 02-bar.md)."

  - id: knowledge.l1_wiki_templates
    name: "L1 Wiki framework-shipped templates"
    description: "Three templates in .dexCore/core/wiki-templates/: institutional-knowledge, project-glossary, architecture-notes. Users copy into myDex/.dex/wiki/ and fill in."
    status: enabled
    phase: 5.2.a
    enterprise_compliance: ok
    requires: []
    depends_on: [knowledge.l1_wiki]
    docs: .dexCore/core/wiki-templates/README.md
    tests:
      - tests/e2e/04-knowledge-l1-wiki-scaffold.test.sh

  - id: knowledge.l2_tank_sqlite
    name: "L2 Tank (native SQLite + Chunker + Semantic Search) — parent"
    description: "Parent feature. Broken into 6 sub-features tracked independently: schema, init, ingest, embed, query, wire-copilot. See .dexCore/_dev/docs/L2-TANK.md for architecture + architectural-fit review."
    status: enabled
    phase: 5.2.b
    enterprise_compliance: ok
    requires: [sqlite3]
    depends_on: []
    docs: .dexCore/_dev/docs/L2-TANK.md
    tests:
      - tests/e2e/12-knowledge-l2-tank-scaffold.test.sh
    primary_target: github_copilot

  - id: knowledge.l2_tank_schema
    name: "L2 Tank — SQLite Schema v1"
    description: "Schema defining chunks, chunks_fts (FTS5), embeddings, meta, ingest_runs tables + sync triggers. Applied by l2-init.sh. Verified by test 12 (parses to fresh sqlite3 in-memory DB + tables exist + FTS5 queryable)."
    status: enabled
    phase: 5.2.b-scaffold
    enterprise_compliance: ok
    requires: [sqlite3]
    depends_on: [knowledge.l2_tank_sqlite]
    docs: .dexCore/core/knowledge/l2/schema.sql
    tests:
      - tests/e2e/12-knowledge-l2-tank-scaffold.test.sh
    primary_target: github_copilot

  - id: knowledge.l2_tank_init
    name: "L2 Tank — init script (l2-init.sh)"
    description: "Creates/validates tank.sqlite at myDex/.dex/l2/. Idempotent (re-applying schema is safe). Has --check mode for CI/validation. Test 12 verifies fixture DB creation + --check workflow + all expected tables."
    status: enabled
    phase: 5.2.b-scaffold
    enterprise_compliance: ok
    requires: [sqlite3]
    depends_on: [knowledge.l2_tank_schema]
    docs: .dexCore/core/knowledge/l2/l2-init.sh
    tests:
      - tests/e2e/12-knowledge-l2-tank-scaffold.test.sh
    primary_target: github_copilot

  - id: knowledge.l2_tank_ingest
    name: "L2 Tank — ingest script (l2-ingest.sh) — REAL CHUNKER"
    description: "Real implementation shipped Phase 5.2.b-ingest (2026-04-20). Chunks markdown sources via heading-aware splitter (l2-chunker.awk, MAX_SIZE=2048 default, per-chunk truncation on overflow). SHA-256-based dedup: unchanged source = no-op skip, changed source = delete-and-re-insert. Source-type auto-detected from path (wiki/chronicle/ingest). SQL generation via ruby (NUL-safe, single-quote-escape-safe). ingest_runs audit log per invocation. Embeddings NOT yet computed (5.2.b-embed is next slice)."
    status: enabled
    phase: 5.2.b-ingest
    enterprise_compliance: ok
    requires: [bash, sqlite3, ruby, awk]
    depends_on: [knowledge.l2_tank_init]
    docs: .dexCore/_dev/docs/L2-TANK.md
    tests:
      - tests/e2e/12-knowledge-l2-tank-scaffold.test.sh
      - tests/e2e/13-knowledge-l2-tank-ingest.test.sh
    primary_target: github_copilot
    known_issues:
      - "Chunking v1 is heading-based (h1/h2, fallback to h3). No sliding-window overlap yet (future v2 if semantic search reveals blind spots). Per-chunk truncation on overflow is documented but fires only at MAX_SIZE+."
      - "Source-type auto-detect works only for wiki / chronicle patterns; other paths default to 'ingest'. Extensible via path case in script."
      - "Embeddings column remains empty after ingest — 5.2.b-embed slice fills it."

  - id: knowledge.l2_tank_query
    name: "L2 Tank — query script (l2-query.sh) — FTS5 KEYWORD SEARCH"
    description: "Real FTS5 keyword search shipped Phase 5.2.b-query (2026-04-20). BM25 ranking, markdown/JSON output formats, --top N limit, --source-type filter (wiki/chronicle/ingest), graceful empty-tank + no-match + missing-tank cases (all exit 0 with notices). Content newline preservation via sqlite3 .mode json. Cosine-similarity hybrid ranking (semantic) is a future slice — requires embeddings (see knowledge.l2_tank_embed, deferred)."
    status: enabled
    phase: 5.2.b-query
    enterprise_compliance: ok
    requires: [bash, sqlite3, ruby]
    depends_on: [knowledge.l2_tank_init]
    docs: .dexCore/_dev/docs/L2-TANK.md
    tests:
      - tests/e2e/12-knowledge-l2-tank-scaffold.test.sh
      - tests/e2e/14-knowledge-l2-tank-query.test.sh
    primary_target: github_copilot
    known_issues:
      - "Keyword-only today. No semantic (cosine-similarity) ranking yet — awaits knowledge.l2_tank_embed to populate the embeddings table."
      - "FTS5 rank is BM25 (lower = better). Output shows raw rank values; no normalization (0..1 scale) yet — intentional, lets power-users see actual BM25 scores."
      - "Multi-word queries without explicit FTS5 operators are treated as phrase queries (wrapped in double-quotes). For OR / AND / NEAR, users can pass FTS5 syntax directly (double-quote-escape is handled)."

  - id: knowledge.l2_tank_wire_copilot
    name: "L2 Tank → Copilot injection — seed-query baked at build time"
    description: "Shipped Phase 5.2.b-wire-copilot (2026-04-20). build-instructions.sh invokes l2-query.sh with user's seed query (from myDex/.dex/l2/copilot-seed-query.txt) at build time. Top-3 chunks bake into copilot-instructions.md under a '# L2 TANK (retrieved for seed query)' block. Cap: L2_MAX_COPILOT=2000 bytes (within 35KB copilot-instructions cap; stays ~3.5KB headroom with wiki empty). Opt-in per user — missing seed file / missing tank / empty tank / no query matches = silent no-op (no pollution). Drift-check correctly includes l2_block output in expected_hash."
    status: enabled
    phase: 5.2.b-wire-copilot
    enterprise_compliance: ok
    requires: [bash, sqlite3, ruby]
    depends_on: [knowledge.l2_tank_query, knowledge.l1_wiki_injection_copilot]
    docs: .dexCore/_dev/docs/L2-TANK.md
    tests:
      - tests/e2e/15-l2-copilot-wire.test.sh
    primary_target: github_copilot
    known_issues:
      - "Seed query is user-configured static text in myDex/.dex/l2/copilot-seed-query.txt. No dynamic seeds (e.g. session-topic-driven) yet — future work if useful."
      - "Top-N=3 hardcoded; could become configurable per build. For now reasonable default given 2KB cap."
      - "Cap enforcement: oversized chunks get hard-truncated at L2_MAX_COPILOT with [L2 TRUNCATED] marker. Test 15 Scenario 6 verifies."

  - id: knowledge.l2_tank_enterprise_compliance
    name: "L2 Tank — enterprise compliance enforcement (deferred)"
    description: "Script-level enforcement: l2-ingest.sh + l2-query.sh read profile.company.data_handling_policy and block non-compliant embedding backends. Default: Ollama local (compliant with local_only). OpenAI/cloud backends: blocked unless cloud_llm_allowed + explicit consent. Overridable via *force-override (audit chronicle entry). Ships in 5.2.b-enterprise-audit."
    status: deferred
    phase: 5.2.b-enterprise-audit
    enterprise_compliance: ok
    requires: []
    depends_on: [knowledge.l2_tank_ingest, knowledge.l2_tank_query, onboarding.data_handling_gate]
    docs: .dexCore/_dev/docs/L2-TANK.md
    tests: []
    primary_target: github_copilot

