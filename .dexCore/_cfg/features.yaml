  - id: knowledge.l2_tank_embed
    name: "L2 Tank — embedding generator (l2-embed.sh) — Ollama nomic-embed-text"
    description: "Shipped Phase 5.2.b-embed (2026-04-20). Generates embeddings for chunks via Ollama's /api/embeddings endpoint and stores them as JSON-array vectors in the embeddings table. Default backend: ollama/nomic-embed-text (137 MB, 768 dim, sweet-spot for local semantic search). Idempotent by default (skips already-embedded chunks); --all forces refresh after model switch; --batch N caps per-run; --dry-run shows plan; --require-backend flips the graceful default to exit 4 when backend unavailable. When Ollama is not installed / not running / model not pulled, the script exits 0 with a clear explanation + install hint — zero side effects, keyword-only search remains unaffected. Audit row written per run. Cloud backends (openai, anthropic) are scaffolded in the backend-routing detector but implementation is gated on knowledge.l2_tank_enterprise_compliance."
