    description: "Shipped Phase 5.1.d first slice + DexMaster menu follow-up (both 2026-04-21). CLI layer: .dexCore/core/agents/packs.sh with list / status / enable / disable subcommands + --format json + --state FILE. User state at myDex/.dex/config/packs.yaml (user-owned, gitignored); template at packs.yaml.example tracked. Pack manifests at .dexCore/core/agents/packs/ are framework-shipped. Mandatory packs (manifest: mandatory=true) refuse disable — core_pack enforces this. DexMaster menu layer: dex-master.md activation step 2.7 loads pack state at session start (bash packs.sh list --format json → {enabled_packs} session var); *packs / *enable-pack / *disable-pack menu items wrap the CLI with conversational prompts; *list-agents is pack-filtered (agents in disabled packs appear in a collapsed 'Hidden — pack disabled' footer). Space-in-path hardening (2026-04-21): NUL-safe find + bash array round-trip through discover_packs_into — regression-guarded by test 21."
    status: enabled
    phase: 5.1.d
    enterprise_compliance: ok
    requires: [bash, ruby]
    depends_on: [agents.core_pack]
    docs: .dexCore/core/agents/packs.sh
    tests:
      - tests/e2e/21-agent-packs.test.sh
      - tests/e2e/22-dexmaster-pack-rendering.test.sh
    primary_target: github_copilot
    validated_at: "2026-04-21T03:30:00Z"
    validation_notes: "Structurally validated: CLI layer end-to-end-tested (test 21: 62/62 incl. space-path regression); DexMaster menu layer asserted present (test 22: 27/27 — step 2.7, three menu items, three prompt handlers, list-agents pack filter, drift-check). Behavioral validation of the live agent session (menu rendering in an actual Claude/Copilot turn) is CLAUDE_E2E_LIVE-gated and deferred to a targeted live-walkthrough — not the same uncertainty class as the L2 embed arc's pre-live bugs because the surface is pure prompting, not bash + ruby logic."
    known_issues:
      - "YAML state-file I/O is minimal-grep-awk; hand-edited exotic layouts may not round-trip. Users should let packs.sh write the file or copy the template."
      - "No batch enable/disable in this slice. Future convenience flag: packs.sh enable-all / disable-all if the use case materializes."
      - "Pack-filter in *list-agents uses pack-manifest path lookup (agent's `path` in CSV vs. `agents[].path` in packs/*.yaml manifests), NOT a `pack:` field on individual features.yaml rows — that field would never work because agents aren't listed individually in features.yaml (features.yaml `agents:` section carries PACK-LEVEL entries only; individual agents live in agent-manifest.csv + on-disk files). Current manifests (core_pack 3 / meta_pack 7 / onboarding_pack 3) cover 13 of the 43 agents in the CSV; the other 30 are orphans + default-visible. Populating the remaining packs (dis_pack / game_pack / dhl_pack / potential additional meta agents) would close the coverage gap."

