    tests:
      - tests/e2e/integrations/claude-code/07-onboarding-overwrite-reject-confirm.test.sh
    known_issues:
      - "Reject path covered; actual confirmed-overwrite path (choice 2 → 'j' → full walkthrough) is Tier 5.5.3b — higher cost (~10 USD) because it chains a fresh walkthrough."
      - "Confirm-gate wording match uses tolerant regex (sicher|wirklich|überschreiben|confirm|sure|[j/n]|[y/n]). Exact phrasing from mydex-agent is the PRIMARY match; others accept LLM paraphrasing."
      - "Safety-critical assertion is SHA-256 equality — tolerant on phrasing, strict on file-content outcome."

  - id: quality.walkthrough_existing_profile_edge
    name: "Existing-Profile Edge Case — cancel path (Tier 5.5 first slice)"
    description: "Proves walkthrough does NOT silently overwrite an existing profile.yaml. Structural: mydex-agent.md contains Check-Existing-Profile step with 4 choices + confirmation-gate on overwrite. Live (opt-in): install fixture profile, run *mydex + *onboarding, verify agent recognizes existing profile, offers 4 choices, respects 'cancel' choice (4) without modifying the file. SHA-256 comparison post-walk is the critical safety assertion."
